name: client_app
description: "LogiRoute Mobile App for Delivery Partners and Customers"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6

  # Navigation
  go_router: ^14.2.0

  # Networking & HTTP
  http: ^1.2.1
  dio: ^5.5.0-dev.1

  # Maps & Location Telemetry
  geolocator: ^12.0.0
  google_maps_flutter: ^2.6.1

  # Local Ephemeral Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Push Notifications (Firebase)
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
