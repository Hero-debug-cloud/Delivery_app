version: '3.8'

services:
  # Database Service (PostgreSQL + TimescaleDB + PostGIS)
  db:
    image: ngosang/timescaledb-postgis:2.13.0-pg16-postgis3.4
    container_name: logiroute-db-dev
    restart: always
    environment:
      POSTGRES_DB: logiroute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql

  # Cache & Ephemeral Telemetry Cache (Redis)
  redis:
    image: redis:7-alpine
    container_name: logiroute-redis-dev
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata-dev:/data

  # Object Storage Service (MinIO)
  minio:
    image: minio/minio:latest
    container_name: logiroute-minio-dev
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - miniodata-dev:/data
    command: server /data --console-address ":9001"

  # MinIO Setup Service to auto-create bucket
  minio-setup:
    image: minio/mc:latest
    container_name: logiroute-minio-setup-dev
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadminpassword); do
        echo 'Waiting for MinIO server to start...';
        sleep 1;
      done;
      if ! /usr/bin/mc ls myminio/logiroute-uploads >/dev/null 2>&1; then
        echo 'Creating private bucket logiroute-uploads...';
        /usr/bin/mc mb myminio/logiroute-uploads;
      else
        echo 'Bucket logiroute-uploads already exists.';
      fi;
      echo 'MinIO S3 setup complete.';
      exit 0;
      "

  # Routing Engine Service (OSRM Backend)
  osrm:
    image: osrm/osrm-backend:latest
    container_name: logiroute-osrm-dev
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    command: >
      sh -c "
      if [ -f /data/map.osrm ]; then
        echo 'Starting OSRM routing engine...';
        osrm-routed --algorithm mld /data/map.osrm;
      else
        echo '========================================================================';
        echo 'WARNING: No processed OSRM map file found at /data/map.osrm.';
        echo 'Please check root README.md for instructions on how to load map data.';
        echo '========================================================================';
        tail -f /dev/null;
      fi
      "

  # API Backend Server in Dev mode with Live Reloading
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: logiroute-api-dev
    restart: always
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_URL: postgres://postgres:postgres@db:5432/logiroute
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadminpassword
      S3_BUCKET: logiroute-uploads
      S3_PUBLIC_URL: http://localhost:9000
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./server:/app
      - /app/node_modules
    command: >
      sh -c "
      until nc -z db 5432; do
        echo 'Waiting for PostgreSQL database to start on port 5432...';
        sleep 1;
      done;
      echo 'Database is online. Running Drizzle migrations...';
      bun run db:migrate;
      echo 'Migrations complete. Starting Hono API server in DEV mode...';
      bun run dev;
      "

  # Next.js Admin Frontend in Dev mode with Fast Refresh
  client-admin:
    build:
      context: ./client-admin
      dockerfile: Dockerfile
    container_name: logiroute-client-admin-dev
    restart: always
    ports:
      - "3010:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./client-admin:/app
      - /app/node_modules
      - /app/.next
    command: bun run dev

volumes:
  pgdata-dev:
  redisdata-dev:
  miniodata-dev:
